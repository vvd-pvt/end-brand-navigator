<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>END Brand Navigator Mobile</title>
<style>
:root {
  --bg:#f4f3ef; --panel:#ffffff; --text:#111111; --muted:#777777; --line:#dedad1;
  --button:#111111; --buttonText:#ffffff; --chip:#f8f7f3; --hover:#111111; --hoverText:#ffffff;
}
body.dark {
  --bg:#111111; --panel:#1b1b1b; --text:#f3f1ea; --muted:#aaa; --line:#383838;
  --button:#f3f1ea; --buttonText:#111; --chip:#242424; --hover:#f3f1ea; --hoverText:#111;
}
* { box-sizing:border-box; }
html { -webkit-text-size-adjust:100%; }
body {
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
}
.wrap {
  max-width:640px;
  margin:0 auto;
  padding:16px 14px 92px;
}
.header {
  border-bottom:1px solid var(--line);
  padding-bottom:14px;
  margin-bottom:14px;
}
h1 {
  margin:0;
  font-size:24px;
  letter-spacing:.01em;
}
.sub {
  margin-top:7px;
  color:var(--muted);
  font-size:12px;
  line-height:1.65;
}
.tools {
  position:sticky;
  top:0;
  z-index:10;
  background:var(--bg);
  padding:10px 0 12px;
  display:grid;
  grid-template-columns:1fr 74px 64px;
  gap:8px;
  border-bottom:1px solid var(--line);
  margin-bottom:10px;
}
input {
  width:100%;
  min-height:46px;
  padding:12px 13px;
  border:1px solid var(--line);
  border-radius:12px;
  background:var(--panel);
  color:var(--text);
  font-size:16px;
}
button {
  min-height:46px;
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px 10px;
  background:var(--panel);
  color:var(--text);
  cursor:pointer;
  font-size:12px;
}
button.active, button:hover {
  background:var(--button);
  color:var(--buttonText);
}
.filters {
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:4px 0 8px;
  margin:0 -2px 6px;
  -webkit-overflow-scrolling:touch;
}
.filters::-webkit-scrollbar { display:none; }
.chip {
  flex:0 0 auto;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:38px;
  padding:9px 12px;
  border:1px solid var(--line);
  border-radius:999px;
  background:var(--chip);
  color:var(--text);
  cursor:pointer;
  font-size:12px;
  white-space:nowrap;
}
.chip.active {
  background:var(--button);
  color:var(--buttonText);
}
.grid {
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
  align-items:start;
}
.category {
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
}
h2 {
  margin:0 0 12px;
  font-size:17px;
  line-height:1.35;
  border-bottom:1px solid var(--line);
  padding-bottom:10px;
}
.country-block {
  margin-bottom:17px;
}
h3 {
  margin:0 0 8px;
  font-size:12px;
  color:var(--muted);
  letter-spacing:.08em;
}
.brand-list {
  display:grid;
  gap:8px;
}
.brand {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  min-height:48px;
  padding:12px 12px;
  border:1px solid var(--line);
  border-radius:12px;
  background:var(--chip);
  color:var(--text);
  text-decoration:none;
  -webkit-tap-highlight-color:transparent;
}
.brand:active {
  transform:scale(.99);
}
.brand-name {
  font-size:15px;
  line-height:1.25;
  font-weight:650;
}
.meta {
  display:flex;
  align-items:center;
  gap:5px;
  white-space:nowrap;
}
.country {
  font-size:10px;
  color:var(--muted);
}
.kind {
  font-size:10px;
  border:1px solid var(--line);
  border-radius:999px;
  padding:2px 6px;
  color:var(--muted);
}
.empty {
  display:none;
  text-align:center;
  padding:34px 16px;
  color:var(--muted);
  border:1px dashed var(--line);
  border-radius:14px;
}
.footer {
  margin-top:14px;
  color:var(--muted);
  font-size:11px;
  line-height:1.7;
}
@media (min-width:760px) {
  .wrap { max-width:900px; }
  .grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <h1>END Brand Navigator<br><span style="font-size:14px;color:var(--muted);font-weight:500;">Mobile</span></h1>
      <div class="sub">ストリート / きれいめ（Maison Margiela寄り） / 靴・バッグ・小物。国順で表示。ブランドページがないものは検索結果へ。</div>
    </div>
    <div class="sub">スマホで開いてホーム画面に追加 / リンクは同じタブ</div>
  </div>

  <div class="tools">
    <input id="search" placeholder="ブランド検索：例 Wax / Margiela / SPZL">
    <button id="allBtn" class="active">すべて表示</button>
    <button id="themeBtn">Dark</button>
  </div>

  <div class="filters" id="categoryFilters"></div>
  <div class="filters" id="countryFilters"></div>

  <main class="grid" id="grid"></main>
  <div class="empty" id="empty">該当ブランドがありません。</div>

  <div class="footer">
    Source: uploaded END. brands HTML. adidas SPZL is linked to END catalog search:
    https://www.endclothing.com/jp/catalogsearch/results?q=adidas%20spzl
  </div>
</div>

  "Clean & Mode":"Clean & Mode / きれいめ",
  "Footwear & Accessories":"Footwear & Accessories / 靴・バッグ・小物"
};

function uniq(arr) { return [...new Set(arr)]; }

function renderFilters() {
  const cf = document.getElementById("categoryFilters");
  cf.innerHTML = "";
  [["all","すべてのカテゴリ"], ...categoryOrder.map(c=>[c, labels[c]])].forEach(([val, lab]) => {
    const el = document.createElement("button");
    el.className = "chip" + (selectedCategory === val ? " active" : "");
    el.textContent = lab;
    el.onclick = () => { selectedCategory = val; render(); };
    cf.appendChild(el);
  });

  const yf = document.getElementById("countryFilters");
  yf.innerHTML = "";
  [["all","すべての国"], ...countryOrder.map(c=>[c,c])].forEach(([val, lab]) => {
    const el = document.createElement("button");
    el.className = "chip" + (selectedCountry === val ? " active" : "");
    el.textContent = lab;
    el.onclick = () => { selectedCountry = val; render(); };
    yf.appendChild(el);
  });
}

function visibleBrands() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  return brands.filter(b => {
    const matchQ = !q || [b.name,b.category,b.country,b.countryGroup].join(" ").toLowerCase().includes(q);
    const matchCat = selectedCategory === "all" || b.category === selectedCategory;
    const matchCountry = selectedCountry === "all" || b.countryGroup === selectedCountry;
    return matchQ && matchCat && matchCountry;
  });
}

  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");

  categoryOrder.forEach(cat => {
    if (selectedCategory !== "all" && selectedCategory !== cat) return;
    const catItems = list.filter(b => b.category === cat);
    if (!catItems.length) return;

    const section = document.createElement("section");
    section.className = "category";
    section.innerHTML = `<h2>${labels[cat]}</h2>`;

    countryOrder.forEach(countryGroup => {
      const countryItems = catItems.filter(b => b.countryGroup === countryGroup);
      if (!countryItems.length) return;

      const block = document.createElement("div");
      block.className = "country-block";
      block.innerHTML = `<h3>${countryGroup}</h3><div class="brand-list"></div>`;
      const listEl = block.querySelector(".brand-list");

      countryItems.sort((a,b)=>a.name.localeCompare(b.name)).forEach(b => {
        const a = document.createElement("a");
        a.className = "brand";
        a.href = b.href;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        const kind = b.kind === "search" ? "検索" : "Brand";
        a.innerHTML = `<span class="brand-name">${b.name}${b.kind==="search" ? " 🔍" : ""}</span><span class="meta"><span class="country">${b.country}</span><span class="kind">${kind}</span></span>`;
        listEl.appendChild(a);
      });
      section.appendChild(block);
    });
    grid.appendChild(section);
  });

  empty.style.display = grid.children.length ? "none" : "block";
  document.getElementById("allBtn").classList.toggle("active", selectedCategory === "all" && selectedCountry === "all" && !document.getElementById("search").value);
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("allBtn").onclick = () => {
  selectedCategory = "all"; selectedCountry = "all"; document.getElementById("search").value = ""; render();
};
document.getElementById("themeBtn").onclick = () => {
  document.body.classList.toggle("dark");
  document.getElementById("themeBtn").textContent = document.body.classList.contains("dark") ? "Light" : "Dark";
};
render();
</script>
</body>
</html>
