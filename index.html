<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>F-DB v8.5</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="header">
      <div>
        <h1>F-DB</h1>
        <div class="version">v8.5 · Shopping OS</div>
      </div>
      <button id="themeToggle">Light</button>
    </div>

    <div class="segment">
      <button id="tabSearch" class="active">Search</button>
      <button id="tabCompare">Compare</button>
      <button id="tabBrands">Brands</button>
    </div>
  </div>

  <section id="viewSearch" class="view">
    <div class="panel">
      <div class="sectionTitle">Product Search</div>
      <input id="productSearch" placeholder="Maison Margiela Replica">
      <div class="rowButtons" id="productLinks"></div>
      <p class="note">Links update as you type. Tap each shop to open reliably.</p>
    </div>
  </section>

  <section id="viewCompare" class="view" style="display:none">
    <div class="panel">
      <div class="sectionTitle">Price Compare</div>
      <input id="compareMemo" placeholder="Item memo: brand / model / size">
      <div class="bestSummary" id="bestSummary"></div>
      <div class="priceGrid" id="priceGrid"></div>
      <div class="rowButtons">
        <button id="calcPrices" class="primary">Calculate</button>
        <button id="clearPrices">Clear</button>
      </div>
      <p class="note">Total = Price + Shipping + Duty / Tax - Coupon.</p>
    </div>
  </section>

  <section id="viewBrands" class="view" style="display:none">
    <div class="panel">
      <div class="sectionTitle">Brand Filters</div>
      <div class="chips">
        <button class="chip active" data-tier="Core">Core</button>
        <button class="chip" data-tier="Candidate">Candidate</button>
        <button class="chip" data-tier="All">All</button>
      </div>
      <div class="chips" id="categoryChips"></div>
      <div class="chips" id="countryChips"></div>
      <div class="chips">
        <button class="chip" id="showHidden">Show Hidden</button>
      </div>
    </div>
    <div class="count" id="brandCount"></div>
    <div class="cards" id="brandList"></div>
  </section>

  <footer>
    F-DB v8 uses separate files: <b>index.html</b>, <b>style.css</b>, <b>app.js</b>, <b>brand_db.json</b>.
  </footer>
</div>
<script src="app.js"></script>
</body>
</html>
